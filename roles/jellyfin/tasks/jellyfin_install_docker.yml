---
- name: Check Docker existence
  block:
    - name: Check Docker binary existence
      stat:
        path: /usr/bin/docker
      register: docker_installed
    - name: Show error if Docker not isntalled
      fail:
        msg: Docker is not installed
      when: not docker_installed.stat.exists

- name: Create Jellyfin system user and group
  block:
    - name: Create jellyfin group
      group:
        name: '{{ JELLYFIN_SYSTEM_USERNAME }}'
        system: true
        state: present
      register: jellyfin_group
      become: true

    - name: Create jellyfin user
      user:
        name: '{{ JELLYFIN_SYSTEM_USERNAME }}'
        group: '{{ JELLYFIN_SYSTEM_USERNAME }}'
        system: true
        create_home: false
        shell: /usr/sbin/nologin
        state: present
      register: jellyfin_user
      become: true

    - name: Get jellyfin gid and uid
      set_fact:
        jellyfin_gid: '{{ jellyfin_group.gid }}'
        jellyfin_uid: '{{ jellyfin_user.uid }}'

- name: Detect Jellyfin transcoding platform
  block:
    - name: Detect Jellyfin transcoding platform
      shell: |
        if [ -r /proc/device-tree/compatible ] && tr '\000' '\n' < /proc/device-tree/compatible | grep -qi rockchip; then
          echo rk
          exit 0
        fi

        for vendor_path in /sys/class/drm/renderD*/device/vendor /sys/class/drm/card*/device/vendor; do
          [ -r "$vendor_path" ] || continue

          vendor="$(cat "$vendor_path")"

          if [ "$vendor" = "0x8086" ]; then
            echo intel
            exit 0
          fi

          if [ "$vendor" = "0x1002" ]; then
            echo amd
            exit 0
          fi
        done

        echo none
      args:
        executable: /bin/bash
      register: jellyfin_transcode_platform_check
      changed_when: false
      failed_when: false

    - name: Set Jellyfin transcoding platform
      set_fact:
        jellyfin_transcode_platform: '{{ jellyfin_transcode_platform_check.stdout }}'

    - name: Get Jellyfin transcoding group gids
      shell: |
        getent group video | cut -d: -f3
        getent group render | cut -d: -f3
      args:
        executable: /bin/bash
      register: jellyfin_transcode_group_gids
      changed_when: false
      failed_when: false

    - name: Set Jellyfin transcoding group_add
      set_fact:
        jellyfin_transcode_group_add: "{{ jellyfin_transcode_group_gids.stdout_lines | reject('equalto', '') | unique | list }}"

    - name: Detect Jellyfin Rockchip devices
      shell: |
        for dev in dri dma_heap mali0 rga mpp_service \
          iep mpp-service vpu_service vpu-service \
          hevc_service hevc-service rkvdec rkvenc vepu h265e; do
          [ -e "/dev/$dev" ] && echo "/dev/$dev"
        done
      args:
        executable: /bin/bash
      register: jellyfin_transcode_rk_devices
      changed_when: false
      failed_when: false
      when: jellyfin_transcode_platform == 'rk'

    - name: Set Jellyfin Rockchip devices
      set_fact:
        jellyfin_transcode_devices: '{{ jellyfin_transcode_rk_devices.stdout_lines }}'
      when: jellyfin_transcode_platform == 'rk'

    - name: Set Jellyfin empty Rockchip devices
      set_fact:
        jellyfin_transcode_devices: []
      when: jellyfin_transcode_platform != 'rk'

    - name: Apply Jellyfin Rockchip udev rules
      block:
        - name: Apply Jellyfin Rockchip device permissions
          template:
            src: rockchip_udev.rules.j2
            dest: /etc/udev/rules.d/99-rk-device-permissions.rules
            owner: root
            group: root
            mode: '0644'
          register: jellyfin_rk_udev_rules
          become: true

        - name: Reload Jellyfin Rockchip udev rules
          command: udevadm control --reload-rules
          when: jellyfin_rk_udev_rules.changed
          become: true

        - name: Trigger Jellyfin Rockchip udev rules
          command: udevadm trigger
          when: jellyfin_rk_udev_rules.changed
          become: true

      when:
        - JELLYFIN_DOCKER_HARDWARE_TRANSCODING_ENABLE | default(false) | bool
        - jellyfin_transcode_platform == 'rk'

- name: Jellyfin docker install
  block:
    - name: Create Jellyfin Docker dirs
      block:
        - name: Create Jellyfin Docker dirs
          file:
            path: '{{ jellyfin_dir.path }}'
            state: directory
            owner: '{{ jellyfin_dir.owner }}'
            group: '{{ jellyfin_dir.owner }}'
            mode: 0755
          loop_control:
            loop_var: jellyfin_dir
          loop:
            - {path: '{{ JELLYFIN_DOCKER_PATH }}', owner: root}
            - {path: '{{ JELLYFIN_DOCKER_CONFIG_PATH }}', owner: '{{ JELLYFIN_SYSTEM_USERNAME }}'}
            - {path: '{{ JELLYFIN_DOCKER_DATA_PATH }}', owner: '{{ JELLYFIN_SYSTEM_USERNAME }}'}
            - {path: '{{ JELLYFIN_DOCKER_CACHE_PATH }}', owner: '{{ JELLYFIN_SYSTEM_USERNAME }}'}
            - {path: '{{ JELLYFIN_DOCKER_LOG_PATH }}', owner: '{{ JELLYFIN_SYSTEM_USERNAME }}'}
          become: true

        - name: Check Jellyfin media source dirs
          stat:
            path: '{{ jellyfin_media_dir_check.source }}'
          loop_control:
            label: '{{ jellyfin_media_dir_check.name }} -> {{ jellyfin_media_dir_check.source }}'
            loop_var: jellyfin_media_dir_check
          loop: '{{ JELLYFIN_DOCKER_MEDIA_PATH }}'
          register: jellyfin_media_dir_stat
          become: true

        - name: Ensure Jellyfin owns existing media source dirs
          file:
            path: '{{ jellyfin_media_dir.jellyfin_media_dir_check.source }}'
            owner: '{{ JELLYFIN_SYSTEM_USERNAME }}'
          loop_control:
            label: '{{ jellyfin_media_dir.jellyfin_media_dir_check.name }} -> {{ jellyfin_media_dir.jellyfin_media_dir_check.source }}'
            loop_var: jellyfin_media_dir
          loop: '{{ jellyfin_media_dir_stat.results }}'
          when:
            - jellyfin_media_dir.stat.exists
            - jellyfin_media_dir.stat.isdir
          become: true

    - name: Apply Jellyfin Compose template
      template:
        src: docker_compose.yml.j2
        dest: '{{ JELLYFIN_DOCKER_PATH }}/docker-compose.yml'
        owner: root
        mode: '0644'
      become: true

    - name: Apply Jellyfin Nginx config
      template:
        src: jellyfin_nginx.conf.j2
        dest: '{{ NGINX_SITES_ENABLED_PATH }}/jellyfin.conf'
        mode: '0644'
      when: JELLYFIN_DOCKER_USE_NGINX
      become: true

- name: Start dockerized Jellyfin
  block:
    - name: Start Jellyfin
      community.docker.docker_compose_v2:
        project_src: '{{ JELLYFIN_DOCKER_PATH }}'
        state: present
        recreate: always
        remove_orphans: true

    - name: Restart Nginx
      community.docker.docker_compose_v2:
        project_src: '{{ NGINX_DOCKER_PATH }}'
        state: present
        recreate: always
        remove_orphans: true
      when: JELLYFIN_DOCKER_USE_NGINX
