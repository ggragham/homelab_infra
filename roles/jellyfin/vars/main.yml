---
JELLYFIN_SYSTEM_USERNAME: jellyfin  # Jellyfin system user.

JELLYFIN_DOCKER_PATH: /opt/jellyfin_docker  # Jellyfin Docker installation path.
JELLYFIN_DOCKER_CONFIG_PATH: '{{ JELLYFIN_DOCKER_PATH }}/config'  # Jellyfin Docker config path.
JELLYFIN_DOCKER_CACHE_PATH: '{{ JELLYFIN_DOCKER_PATH }}/cache'  # Jellyfin Docker cache path.
JELLYFIN_DOCKER_SERVICE_NAME: jellyfin  # Jellyfin Docker service name.
JELLYFIN_DOCKER_CONTAINER_NAME: jellyfin_container  # Jellyfin Docker container name.

JELLYFIN_VIDEO_GID: 64001  # GID for video group inside the container.
JELLYFIN_RENDER_GID: 64002  # GID for render group inside the container.

PROXMOX_DEVICES:  # GPU devices passed through to the container.
  dev0: /dev/dri/card0,gid={{ JELLYFIN_VIDEO_GID }},mode=0660  # Primary DRM device.
  dev1: /dev/dri/renderD128,gid={{ JELLYFIN_RENDER_GID }},mode=0660  # Render node device.
